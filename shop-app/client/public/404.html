<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
  </head>
  <body>
    <script>
      // GitHub Pages cannot do server-side rewrites for SPA routes.
      // This makes direct navigation to /schema, /dashboard, etc. work.
      window.location.replace('/index.html')
    </script>
  </body>
</html>
